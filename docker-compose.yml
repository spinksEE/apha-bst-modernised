services:
  # ==========================================================================
  # PostgreSQL Database
  # ==========================================================================
  postgres:
    image: postgres:15-alpine
    container_name: apha-bst-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-apha_bst}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - apha-bst-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================================================
  # Backend (NestJS + Prisma)
  # ==========================================================================
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      target: development
    container_name: apha-bst-backend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-apha_bst}?schema=public
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRY: ${JWT_EXPIRY:-8h}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
      FRONTEND_URL: http://localhost:3000
    ports:
      - "3001:3001"
    volumes:
      - ./apps/backend/src:/workspace/apps/backend/src
      - ./apps/backend/prisma:/workspace/apps/backend/prisma
      - ./packages/shared/src:/workspace/packages/shared/src
      - /workspace/apps/backend/node_modules
      - /workspace/node_modules
    command: ["sh", "-c", "pnpm --filter backend exec prisma migrate deploy && pnpm --filter backend exec prisma db seed && pnpm --filter backend run start:dev"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - apha-bst-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3001/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ==========================================================================
  # Frontend (React + Vite)
  # ==========================================================================
  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      target: development
    container_name: apha-bst-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      VITE_API_URL: http://backend:3001
    ports:
      - "3000:3000"
    volumes:
      - ./apps/frontend/src:/workspace/apps/frontend/src
      - ./packages/shared/src:/workspace/packages/shared/src
      - /workspace/apps/frontend/node_modules
      - /workspace/node_modules
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - apha-bst-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

# ============================================================================
# Networks
# ============================================================================
networks:
  apha-bst-network:
    driver: bridge

# ============================================================================
# Volumes
# ============================================================================
volumes:
  postgres_data:
    driver: local
